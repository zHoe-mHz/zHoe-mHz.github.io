<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Elegant Javanese Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #111111;
            color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Ornamen Sudut Khas Jawa (Efek Border Emas) */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 150px;
            height: 150px;
            border: 4px double #D4AF37;
            pointer-events: none;
            opacity: 0.7;
        }
        body::before { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        body::after { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* Wadah Profil Utama */
        .profile-container {
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
            border: 2px solid #D4AF37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
            padding: 40px 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 450px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Gunungan / Ornamen Atas */
        .javanese-ornament-top {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: #D4AF37;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }
        .javanese-ornament-top::before, .javanese-ornament-top::after {
            content: " ✦ ";
            color: #fff;
            text-shadow: 0 0 5px #D4AF37;
        }

        /* Foto Profil dengan Frame Emas */
        .avatar-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .avatar-frame {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 3px solid #D4AF37;
            border-radius: 50%;
            transform: rotate(45deg);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }

        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid #1a1a1a;
            position: relative;
            z-index: 2;
        }

        /* Teks Nama & Info */
        .profile-name {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: #D4AF37;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .profile-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b3b3b3;
            margin-bottom: 25px;
        }

        /* Garis Pembatas Ornamen */
        .divider {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }
