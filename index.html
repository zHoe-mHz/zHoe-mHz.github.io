<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Premium - Black & Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- RESET & BASE STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            /* Efek lingkaran cahaya redup di latar belakang */
            background-image: radial-gradient(circle at 50% 50%, #161616 0%, #0a0a0a 100%);
        }

        /* --- KARTU PROFIL --- */
        .profile-card {
            background: rgba(18, 18, 18, 0.85);
            border: 1px solid #d4af37; /* Warna Emas */
            padding: 40px 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 25px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(10px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9), 0 0 35px rgba(212, 175, 55, 0.15);
        }

        /* --- FOTO PROFIL --- */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 25px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d4af37;
            padding: 6px;
            background: #0a0a0a;
        }

        /* --- TEKS (NAMA & JABATAN) --- */
        .profile-card h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 1px;
            /* Efek teks gradasi emas murni ke putih */
            background: linear-gradient(45deg, #d4af37, #f3e5ab, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 13px;
            color: #b3b3b3;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .bio {
            font-size: 14px;
            color: #8c8c8c;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 300;
        }

        /* --- GARIS PEMBATAS --- */
        .divider {
            height: 1px;
            background: linear-gradient(to right, transparent, #d4af37, transparent);
            margin-bottom: 30px;
        }

        /* --- TOMBOL MEDIA SOSIAL --- */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 24px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.3);
            background: rgba(255, 255, 255, 0.02);
            color: #ffffff;
        }

        .social-btn i {
            font-size: 18px;
            color: #d4af37;
            transition: all 0.3s ease;
        }

        .social-btn span {
            flex-grow: 1;
            text-align: center;
            margin-right: -18px; /* Menyeimbangkan teks agar tetap di tengah */
        }

        /* Efek Hover Tombol */
        .social-btn:hover {
            background: #d4af37;
            color: #0a0a0a;
            border-color: #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: scale(1.02);
        }

        .social-btn:hover i {
            color: #0a0a0a;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=150" alt="Foto Profil" class="avatar">
        </div>
        
        <h1>RAYAN PRADITYA</h1>
        <div class="tagline">Creative Director</div>
        <p class="bio">Membantu brand bertumbuh melalui desain visual modern dan strategi digital yang elegan.</p>
        
        <div class="divider"></div>
        
        <div class="social-links">
            <a href="#" target="_blank" class="social-btn">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
            </a>
            
            <a href="#" target="_blank" class="social-btn">
                <i class="fab fa-linkedin-in"></i>
                <span>LinkedIn</span>
            </a>
            
            <a href="#" target="_blank" class="social-btn">
                <i class="fab fa-twitter"></i>
                <span>Twitter / X</span>
            </a>
            
            <a href="#" target="_blank" class="social-btn">
                <i class="fa-solid fa-globe"></i>
                <span>Portfolio Website</span>
            </a>
        </div>
    </div>

</body>
</html>
