<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya | Natural Theme</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            background-attachment: fixed;
            color: #2e7d32;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* --- Profile Card Container --- */
        .profile-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 100%;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(46, 125, 50, 0.15);
            padding: 35px 25px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* --- Avatar / Foto Profil --- */
        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #81c784;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Leaf accent (Dekorasi Daun kecil) */
        .avatar-container::after {
            content: '🌱';
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 24px;
            background: white;
            border-radius: 50%;
            padding: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* --- Info Teks --- */
        .name {
            font-size: 24px;
            font-weight: 600;
            color: #1b5e20;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 14px;
            color: #66bb6a;
            font-weight: 400;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .bio {
            font-size: 14px;
            color: #4e342e; /* Warna earth-tone cokelat hangat */
            line-height: 1.6;
            margin-bottom: 25px;
            background: rgba(232, 245, 233, 0.5);
            padding: 15px;
            border-radius: 12px;
        }

        /* --- Detail Tambahan --- */
        .info-details {
            text-align: left;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            color: #37474f;
        }

        .info-item i {
            margin-right: 12px;
            color: #4caf50;
            width: 20px;
            text-align: center;
        }

        /* --- Sosial Media Links --- */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .social-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #e8f5e9;
            color: #2e7d32;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
            border: 1px solid #a5d6a7;
        }

        .social-icon:hover {
            background: #2e7d32;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3);
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500&auto=format&fit=crop&q=60" alt="Foto Profil" class="avatar">
        </div>

        <h1 class="name">mHaz</h1>
        <p class="tagline">Web Designer & Nature Lover</p>

        <p class="bio">
            Halo! Saya adalah seorang antusias teknologi yang sangat menyukai keindahan alam. Berfokus pada pembuatan desain digital yang bersih, minimalis, dan berdampak positif bagi sesama.
        </p>

        <hr style="border: 0; border-top: 1px solid #c8e6c9; margin-bottom: 20px;">

        <div class="info-details">
            <div class="info-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Jakarta, Indonesia</span>
            </div>
            <div class="info-item">
                <i class="fas fa-envelope"></i>
                <span>emailkamu@domain.com</span>
            </div>
            <div class="info-item">
                <i class="fas fa-briefcase"></i>
                <span>Freelancer / Mahasiswa</span>
            </div>
        </div>

        <div class="social-links">
            <a href="#" class="social-icon" target="_blank" title="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon" target="_blank" title="LinkedIn"><i class="fab fa-linkedin-in"></i></a>
            <a href="#" class="social-icon" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
            <a href="#" class="social-icon" target="_blank" title="Twitter/X"><i class="fab fa-x-twitter"></i></a>
        </div>
    </div>

</body>
</html>
