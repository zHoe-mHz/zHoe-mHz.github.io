<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - Nuansa Jawa Natural</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-green: #3D5A45;
            --sage-green: #8FBC8F;
            --soft-cream: #F5EFEB;
            --dark-earth: #2C221E;
            --accent-gold: #D4AF37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--soft-cream);
            color: var(--dark-earth);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Ornamen Latar Belakang (Simulasi Ornamen Jawa) */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            opacity: 0.08;
            background-image: url('https://www.transparenttextures.com/patterns/batik-fractal.png'); /* Pola tekstur batik */
            pointer-events: none;
        }
        body::before { top: -50px; left: -50px; transform: rotate(15deg); }
        body::after { bottom: -50px; right: -50px; transform: rotate(-15deg); }

        /* Kartu Profil Utama */
        .profile-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            max-width: 450px;
            width: 100%;
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(61, 90, 69, 0.15);
            border: 2px solid rgba(143, 188, 143, 0.2);
            position: relative;
            z-index: 1;
        }

        /* Ornamen Gunungan Jawa di Atas Kartu */
        .gunungan-ornament {
            font-size: 2rem;
            color: var(--primary-green);
            margin-bottom: 15px;
            opacity: 0.8;
        }
        .gunungan-ornament i {
            display: block;
            transform: scaleY(1.2);
        }

        /* Foto Profil */
        .profile-img-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--primary-green);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* Bingkai Ornamen lingkaran di sekitar foto */
        .profile-img-container::after {
            content: "";
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border: 2px dashed var(--accent-gold);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* Teks Nama & Bio */
        .profile-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--primary-green);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-tagline {
            font-size: 0.9rem;
            color: #6e7c70;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .profile-bio {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--dark-earth);
            margin-bottom: 30px;
            background: rgba(143, 188, 143, 0.1);
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid var(--primary-green);
        }

        /* Pembatas Ornamen (Sederhana tapi Khas) */
        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
        }
        .divider::before, .divider::after {
            content: "";
            height: 1px;
            width: 50px;
            background-color: var(--sage-green);
        }
        .divider span {
            padding: 0 10px;
            color: var(--accent-gold);
            font-size: 0.8rem;
        }

        /* Tombol Media Sosial */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Warna Tombol Sosmed dengan tema Alam */
        .instagram { background-color: #4a5d4e; }
        .linkedin { background-color: #3b5249; }
        .github { background-color: #2b3a34; }

        .social-btn i {
            font-size: 1.2rem;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(61, 90, 69, 0.25);
            filter: brightness(1.1);
        }

        /* Footer/Hak Cipta */
        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: #8a968d;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="gunungan-ornament">
            <i class="fa-solid fa-gopuram"></i>
        </div>

        <div class="profile-img-container">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=400" alt="Foto Profil" class="profile-img">
        </div>

        <h1 class="profile-name">mHazhudi</h1>
        <p class="profile-tagline">Kreator & Pengembang</p>
        
        <p class="profile-bio">
            Sugeng rawuh! Saya adalah seorang antusias teknologi yang menyukai harmoni antara modernitas dan kelestarian budaya alam.
        </p>

        <div class="divider">
            <span>◆ ❖ ◆</span>
        </div>

        <div class="social-links">
            <a href="https://instagram.com/mhaz_hudi" target="_blank" class="social-btn instagram">
                <span><i class="fab fa-instagram"></i> &nbsp; Instagram</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>

            <a href="https://linkedin.com/in/username_kamu" target="_blank" class="social-btn linkedin">
                <span><i class="fab fa-linkedin-in"></i> &nbsp; LinkedIn</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>

            <a href="https://github.com/username_kamu" target="_blank" class="social-btn github">
                <span><i class="fab fa-github"></i> &nbsp; GitHub</span>
                <i class="fa-solid fa-arrow-right"></i>
            </a>
        </div>

        <div class="footer">
            © 2026 • Dibuat dengan Rah
