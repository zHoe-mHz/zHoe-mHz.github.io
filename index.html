<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Profile Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(147, 51, 234, 0.05) 0%, transparent 40%);
        }

        /* --- DASHBOARD CONTAINER --- */
        .dashboard-container {
            display: flex;
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 20px;
            gap: 25px;
        }

        /* --- SIDEBAR NAVIGASI (KIRI) --- */
        .sidebar {
            width: 260px;
            background: rgba(20, 20, 22, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: calc(100vh - 40px);
            position: sticky;
            top: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
            color: #d4af37;
            padding-left: 10px;
            margin-bottom: 40px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 8px;
            list-style: none;
        }

        .nav-item a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            color: #8a8b92;
            text-decoration: none;
            font-weight: 500;
            border-radius: 14px;
            transition: all 0.3s ease;
        }

        .nav-item.active a, .nav-item a:hover {
            color: #ffffff;
            background: rgba(212, 175, 55, 0.1);
            border-left: 3px solid #d4af37;
            padding-left: 15px;
        }

        /* --- MAIN CONTENT (KANAN) --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* Profile Header Banner */
        .profile-header {
            background: linear-gradient(135deg, #1e1e24 0%, #121214 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .profile-info-wrapper {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .profile-avatar-box {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .profile-avatar-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37;
        }

        .status-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 16px;
            height: 16px;
            background: #10b981;
            border: 3px solid #121214;
            border-radius: 50%;
        }

        .profile-text h2 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .profile-text p {
            color: #8a8b92;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

            display: flex;
            gap: 12
