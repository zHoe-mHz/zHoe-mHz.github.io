<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Diri Jawa Emas</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
    --gold:#d4af37;
    --gold2:#ffd700;
    --black:#050505;
    --glass:rgba(255,255,255,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    color:white;
    background:
    radial-gradient(circle at top, rgba(212,175,55,.15), transparent 40%),
    linear-gradient(135deg,#050505,#0f0f0f,#161616);
}

/* BATIK PARANG */
body::before{
    content:"";
    position:fixed;
    inset:0;
    opacity:.08;
    background:
    repeating-linear-gradient(
        -45deg,
        #d4af37 0px,
        #d4af37 8px,
        transparent 8px,
        transparent 40px
    );
    pointer-events:none;
}

/* KILAU EMAS */
.shimmer{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
}

.shimmer::before{
    content:"";
    position:absolute;
    width:40%;
    height:200%;
    top:-50%;
    left:-50%;
    background:linear-gradient(
        90deg,
        transparent,
        rgba(255,215,0,.25),
        rgba(255,255,255,.35),
        rgba(255,215,0,.25),
        transparent
    );
    transform:rotate(25deg);
    animation:shine 8s infinite linear;
}

@keyframes shine{
    from{left:-60%;}
    to{left:150%;}
}

/* ANIMASI CANDI */
.animasi candi{
    width:220px;
    height:280px;
    margin:auto;
    clip-path:polygon(50% 0%, 95% 90%, 5% 90%);
    background:
    linear-gradient(180deg,#ffd700,#d4af37,#6f5312);
    position:relative;
    box-shadow:
    0 0 20px rgba(255,215,0,.4),
    0 0 60px rgba(255,215,0,.2);
}

.animasi candi::before{
    content:"✦";
    position:absolute;
    top:35%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:60px;
    color:#fff5c2;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:40px 20px;
}

.glass{
    background:rgba(255,255,255,.07);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,215,0,.25);
    border-radius:25px;
    box-shadow:
    0 8px 30px rgba(0,0,0,.4),
    inset 0 0 20px rgba(255,215,0,.08);
}

.profile{
    margin-top:20px;
    padding:35px;
    text-align:center;
}

.profile h1{
    font-family:'Cinzel',serif;
    color:var(--gold2);
    font-size:3rem;
    letter-spacing:2px;
    text-shadow:0 0 15px rgba(255,215,0,.5);
}

.profile p{
    color:#ddd;
    margin-top:10px;
}

.socials{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:25px;
}

.socials a{
    text-decoration:none;
    color:white;
    border:1px solid rgba(255,215,0,.3);
    padding:12px 20px;
    border-radius:50px;
    background:rgba(255,255,255,.05);
    transition:.3s;
}

.socials a:hover{
    background:var(--gold);
    color:black;
    transform:translateY(-4px);
}

.widgets{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:30px;
}

.widget{
    padding:25px;
}

.widget-title{
    color:var(--gold2);
    font-weight:600;
    margin-bottom:15px;
}

.clock{
    font-size:2rem;
    font-weight:bold;
}

.date{
    line-height:1.8;
}

.weather{
    font-size:1.1rem;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#b9b9b9;
}

/* ORNAMEN EMAS */
.corner{
    position:fixed;
    width:180px;
    height:180px;
    border:3px solid rgba(212,175,55,.35);
    z-index:-1;
}

.tl{
    top:20px;
    left:20px;
    border-right:none;
    border-bottom:none;
}

.tr{
    top:20px;
    right:20px;
    border-left:none;
    border-bottom:none;
}

.bl{
    bottom:20px;
    left:20px;
    border-right:none;
    border-top:none;
}

.br{
    bottom:20px;
    right:20px;
    border-left:none;
    border-top:none;
}

@media(max-width:768px){
    .profile h1{
        font-size:2rem;
    }

    .gunungan{
        width:160px;
        height:210px;
    }
}
</style>
</head>
<body>

<div class="shimmer"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="container">

    <div class="gunungan"></div>

    <div class="glass profile">

        <h1>Agus mHaz</h1>

        <p>
            Sugeng Rawuh. Selamat datang di profil pribadi saya.
            Menggabungkan nuansa budaya Jawa dengan sentuhan modern
            elegan hitam dan emas.
        </p>

        <div class="socials">
            <a href="#">Instagram</a>
            <a href="#">TikTok</a>
            <a href="#">Facebook</a>
            <a href="#">YouTube</a>
            <a href="#">WhatsApp</a>
        </div>

    </div>

    <div class="widgets">

        <div class="glass widget">
            <div class="widget-title">🕒 Jam Digital</div>
            <div id="clock" class="clock">00:00:00</div>
        </div>

        <div class="glass widget">
            <div class="widget-title">📅 Kalender</div>
            <div id="calendar" class="date"></div>
        </div>

        <div class="glass widget">
            <div class="widget-title">☁️ Cuaca</div>
            <div id="weather" class="weather">
                Memuat data cuaca...
            </div>
        </div>

    </div>

    <div class="footer">
        © 2026 • Profil Personal Jawa Emas
    </div>

</div>

<script>

/* JAM */
function updateClock(){
    const now = new Date();

    const time =
        now.toLocaleTimeString('id-ID');

    document.getElementById('clock').innerHTML = time;
}

setInterval(updateClock,1000);
updateClock();

/* KALENDER */
const hari = [
"Minggu","Senin","Selasa","Rabu",
"Kamis","Jumat","Sabtu"
];

const bulan = [
"Januari","Februari","Maret","April",
"Mei","Juni","Juli","Agustus",
"September","Oktober","November","Desember"
];

function updateDate(){
    const d = new Date();

    document.getElementById("calendar").innerHTML =
    `
    <strong>${hari[d.getDay()]}</strong><br>
    ${d.getDate()} ${bulan[d.getMonth()]} ${d.getFullYear()}
    `;
}

updateDate();

/* CUACA OPEN-METEO */
/* Contoh koordinat Surabaya */
const lat = -7.2575;
const lon = 112.7521;

fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
)
.then(r=>r.json())
.then(data=>{

    const cuaca =
    data.current_weather;

    document.getElementById("weather").innerHTML=
    `
    🌡️ Suhu : ${cuaca.temperature}°C<br>
    💨 Angin : ${cuaca.windspeed} km/jam<br>
    📍 Lokasi : Jawa Timur
    `;
})
.catch(()=>{
    document.getElementById("weather").innerHTML=
    "Gagal memuat cuaca";
});

</script>

</body>
</html>
